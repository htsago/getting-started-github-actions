name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: chat:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'chat:latest'
          format: 'sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Generate SBOM with Syft
        run: syft chat:latest -o spdx-json > sbom.spdx.json

      - name: Save Docker image to tar
        run: docker save chat:latest -o chat.tar

      - name: Generate checksum for image
        run: sha256sum chat.tar > chat.tar.sha256

      - name: Copy artifacts to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          source: "chat.tar,chat.tar.sha256,sbom.spdx.json,docker-compose.yml"
          target: "/opt/chat/"

      - name: Load image and restart service on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            cd /opt/chat
            if ! sha256sum -c chat.tar.sha256; then
              echo "Checksum verification failed! Aborting deployment."
              exit 1
            fi
            docker load -i chat.tar
            docker compose down
            docker compose up -d
            docker image prune -f
